# Edge functions that are reached WITHOUT a Supabase JWT must opt out of the
# gateway's default JWT verification, or every request is rejected 401 before the
# function body (and its own auth) ever runs.
#
#   • stripe-webhook        — Stripe POSTs, authenticated by the stripe-signature
#                             header (verified in-function), never a Supabase JWT.
#   • stripe-identity-return / stripe-connect-return — browser landing pages the
#                             user is redirected to after the hosted Stripe flow.
#
# Every OTHER function is called by the app WITH a JWT and additionally calls
# supabase.auth.getUser(token) itself, so it keeps the default verify_jwt = true.

[functions.stripe-webhook]
verify_jwt = false

[functions.stripe-identity-return]
verify_jwt = false

[functions.stripe-connect-return]
verify_jwt = false

# support-submit — public website Contact form (no JWT), so the gateway JWT check
#   must be off; the function has no per-user auth.
[functions.support-submit]
verify_jwt = false

# support-reply / support-ai-draft are intentionally NOT listed here. The admin
#   console calls them with the signed-in admin's Supabase USER JWT (see
#   admin/app/(console)/support/actions.ts callEdge — Authorization: Bearer
#   <admin session token>), and each function validates that token + admin_users
#   membership + AAL2/MFA in-function (isAdminCaller). Like every other
#   JWT-authenticated function they keep the default verify_jwt = true, so the
#   gateway also rejects any unauthenticated request before the function runs.
#   (There is no x-admin-secret / service-role-header mechanism — that never existed.)

# safety-alert — invoked by the reports AFTER INSERT trigger via pg_net with the
#   x-safety-secret shared secret (SAFETY_ALERT_SECRET), never a user JWT, so the
#   gateway JWT check must be off; the function verifies the secret itself.
[functions.safety-alert]
verify_jwt = false
